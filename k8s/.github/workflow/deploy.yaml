name: Flatmate CI/CD Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: docker build -t ${{ secrets.kedarpatil45 }}/flatmate-app .

    - name: Push Docker Image
      run: docker push ${{ secrets.kedarpatil45 }}/flatmate-app

    - name: Deploy to Kubernetes (manual trigger)
      run: echo "Image pushed to DockerHub. Now run kubectl apply locally."