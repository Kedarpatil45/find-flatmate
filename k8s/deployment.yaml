apiVersion: apps/v1
kind: Deployment
metadata:
  name: flatmate-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flatmate
  template:
    metadata:
      labels:
        app: flatmate
    spec:
      containers:
      - name: flatmate-container
        image: kedarpatil45/flatmate-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000